# apps.conf -- App manifest for onboarding
# One line per app. Adding a new app = adding one line. No code changes needed for standard apps.
#
# Format: APP_ID|DISPLAY_NAME|APP_BUNDLE|URL_KEY|PROCESS_PATH|TERMINATE|AUTO_UPDATE|PHASE|HANDLER|ICON
#
# PHASE:   parallel       = launches immediately with all other parallel apps
#          after_parallel  = waits until every parallel app finishes, then runs sequentially
#
# HANDLER: standard       = generic install-standard.zsh (download + detect type + install)
#          chunked         = install-chunked.zsh (chunked parallel download for large apps)
#          mdm-enrollment  = install-mdm-enrollment.zsh (MDM enrollment client + auto-updater)
#          licensed        = install-licensed.zsh (license/key assignment after install)
#
# PROCESS_PATH: "none" if the app has no process to wait for before installing
#
AppOne|MDM Enrollment Client|MDM Client.app|URL_APP_ONE|/Applications/MDM Client.app/Contents/MacOS/MDM Client|true|true|parallel|mdm-enrollment|app-01.png
AppTwo|Office Suite|Office Suite|URL_APP_TWO_BASE|none|true|true|parallel|chunked|app-02.png
AppThree|Web Browser|Web Browser.app|URL_APP_THREE|/Applications/Web Browser.app/Contents/MacOS/Web Browser|false|true|parallel|standard|app-03.png
AppFour|Endpoint Security|Endpoint Security.app|URL_APP_FOUR|/Applications/Endpoint Security.app/Contents/MacOS/Endpoint Security|false|true|parallel|licensed|app-04.png
AppFive|Video Conferencing|Video Conf.app|URL_APP_FIVE|/Applications/Video Conf.app/Contents/MacOS/Video Conf|false|true|parallel|standard|app-05.png
