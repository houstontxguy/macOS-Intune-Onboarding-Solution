#!/bin/zsh
# urls.conf -- Centralized URL management for all onboarding packages
# Update SAS_TOKEN when it expires. Update individual URLs when package versions change.
#
# VER 2.0.0
# Your Organization IT

AZURE_BASE="https://yourstorageaccount.blob.core.windows.net/your-container/onboarding"

# Container-level SAS token (sr=c) -- works for all blobs in the container
# To rotate: generate a new container SAS in Azure Portal and paste here
SAS_TOKEN="YOUR_SAS_TOKEN_HERE"

# Swift Dialog
URL_SWIFT_DIALOG="${AZURE_BASE}/dialog-3.0.0.pkg?${SAS_TOKEN}"

# App One -- MDM enrollment client + auto-updater
URL_APP_ONE="${AZURE_BASE}/MDMClient-Installer.pkg?${SAS_TOKEN}"
URL_MDM_ENROLLMENT_AUTOUPDATER="${AZURE_BASE}/AutoUpdater.pkg?${SAS_TOKEN}"

# App Two -- Office suite (chunked download)
URL_APP_TWO_BASE="${AZURE_BASE}"
OFFICE_CHUNK_PREFIX="OfficeSuite_Installer.part_"
OFFICE_CHUNK_LIST=(aa ab ac ad ae af ag ah ai aj ak al am an)
OFFICE_EXPECTED_SIZE=2000000000

# App Three -- Web browser
URL_APP_THREE="${AZURE_BASE}/WebBrowser-1.0.pkg?${SAS_TOKEN}"

# App Four -- Endpoint security (licensed)
URL_APP_FOUR="${AZURE_BASE}/EndpointSecurity-1.0.pkg?${SAS_TOKEN}"

# App Five -- Video conferencing
URL_APP_FIVE="${AZURE_BASE}/VideoConferencing-1.0.pkg?${SAS_TOKEN}"

# App Six -- Monitoring agent
URL_APP_SIX="${AZURE_BASE}/MonitoringAgent-1.0.pkg?${SAS_TOKEN}"

# App Seven -- Privilege manager
URL_APP_SEVEN="${AZURE_BASE}/PrivilegeManager-1.0.pkg?${SAS_TOKEN}"

# App Eight -- DNS security
URL_APP_EIGHT="${AZURE_BASE}/DNSSecurity-1.0.pkg?${SAS_TOKEN}"

# App Nine -- Cloud connector
URL_APP_NINE="${AZURE_BASE}/CloudConnector-1.0.pkg?${SAS_TOKEN}"

# App Ten -- VPN client
URL_APP_TEN="${AZURE_BASE}/VPNClient-1.0.pkg?${SAS_TOKEN}"

# Onboarding scripts zip URL (used by bootstrap)
URL_ONBOARDING_ZIP="${AZURE_BASE}/OnboardingScripts.zip?${SAS_TOKEN}"

# Licensed app key (used by install-licensed.zsh)
LICENSE_KEY="YOUR_LICENSE_KEY_HERE"
